name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the commit count is correct
      - name: Stamp version into index.html
        run: |
          node -e '
            const fs=require("fs"), cp=require("child_process");
            const sh=c=>cp.execSync(c).toString().trim();
            const count=sh("git rev-list --count HEAD");
            const build={
              version:"v1.0."+count,
              sha:sh("git rev-parse --short HEAD"),
              url:"https://github.com/"+process.env.GITHUB_REPOSITORY+"/commit/"+sh("git rev-parse HEAD"),
              date:new Date().toISOString().slice(0,10),
              msg:sh("git log -1 --pretty=%s")
            };
            let h=fs.readFileSync("index.html","utf8");
            h=h.replace(/\/\*BUILD\*\/ [^;]*/, ()=>"/*BUILD*/ "+JSON.stringify(build));
            fs.writeFileSync("index.html",h);
            console.log("Stamped", build.version, build.sha);
          '
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deploy
        uses: actions/deploy-pages@v4
