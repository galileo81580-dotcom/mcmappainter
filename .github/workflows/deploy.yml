name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the commit count is correct
      - name: Stamp version into index.html
        run: |
          COUNT=$(git rev-list --count HEAD)
          SHA=$(git rev-parse --short HEAD)
          VER="v1.0.$COUNT"
          URL="https://github.com/${GITHUB_REPOSITORY}/commit/$(git rev-parse HEAD)"
          DATE=$(date -u +%Y-%m-%d)
          echo "Stamping $VER ($SHA)"
          sed -i "s|/\*BUILD\*/ [^;]*|/*BUILD*/ {version:\"$VER\",sha:\"$SHA\",url:\"$URL\",date:\"$DATE\"}|" index.html
          grep -n "/\*BUILD\*/" index.html | head -1
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deploy
        uses: actions/deploy-pages@v4
